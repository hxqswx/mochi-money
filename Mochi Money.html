<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: "Nunito", system-ui, -apple-system, sans-serif;
    color: #1a1410;
    background:
      radial-gradient(circle at 15% 20%, #FFE9D6 0%, transparent 38%),
      radial-gradient(circle at 85% 80%, #E8D6FF 0%, transparent 38%),
      radial-gradient(circle at 50% 50%, #FFF6E9 0%, #FFE9F0 100%);
    background-attachment: fixed;
    min-height: 100vh;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(rgba(26,20,16,0.07) 1px, transparent 1px),
      radial-gradient(rgba(26,20,16,0.07) 1px, transparent 1px);
    background-size: 32px 32px, 32px 32px;
    background-position: 0 0, 16px 16px;
    opacity: 0.6;
  }
  @keyframes wave {
    0%, 60%, 100% { transform: rotate(0deg); }
    10% { transform: rotate(14deg); }
    20% { transform: rotate(-8deg); }
    30% { transform: rotate(14deg); }
    40% { transform: rotate(-4deg); }
    50% { transform: rotate(10deg); }
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  @keyframes pop {
    0% { transform: scale(0.7); opacity: 0; }
    60% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }
  .pop-in { animation: pop 280ms cubic-bezier(.34,1.56,.64,1); }
  .phone-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .phone-scroll { scrollbar-width: none; }
  .stage {
    min-height: 100vh; width: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 16px; position: relative; z-index: 1;
  }
  .title-block { position: absolute; user-select: none; pointer-events: none; }
  .title-block .ko {
    font-family: "Fredoka", sans-serif; font-weight: 600;
    color: #1a1410; line-height: 0.95; letter-spacing: -0.01em;
  }
  .title-block .sub {
    font-family: "Nunito", sans-serif; font-weight: 800;
    color: rgba(26,20,16,0.55); margin-top: 8px;
  }
  @media (max-width: 920px) {

<script type="text/babel">
// ─────────────────────────────────────────────────────────────
// TWEAKS PANEL
// ─────────────────────────────────────────────────────────────
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-field{appearance:none;box-sizing:border-box;width:100%;min-width:0;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg.dragging .twk-seg-thumb{transition:none}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2;overflow-wrap:anywhere}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  if (!open) {
    return (
      <button onClick={() => setOpen(true)} style={{
        position: "fixed", right: 16, bottom: 16, zIndex: 2147483645,
        background: "rgba(250,249,247,.85)", border: ".5px solid rgba(255,255,255,.6)",
        borderRadius: 10, padding: "6px 12px", fontSize: 11.5, fontWeight: 600,
        cursor: "pointer", boxShadow: "0 2px 8px rgba(0,0,0,.15)",
        backdropFilter: "blur(12px)", color: "#29261b",
      }}>Tweaks ⚙️</button>
    );
  }

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()}
                  onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {
  return <div className="twk-sect">{label}</div>;
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);

  if (!fitsAsSegments) {
    return (
      <div className="twk-row">
        <div className="twk-lbl"><span>{label}</span></div>
        <select className="twk-field" value={value} onChange={(e) => {
          const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === e.target.value);
          onChange(m === undefined ? e.target.value : typeof m === 'object' ? m.value : m);
        }}>
          {opts.map((o) => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      </div>
    );
  }

  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// CREATURES
// ─────────────────────────────────────────────────────────────

  </g>
);

const Eyes = ({ cx1 = -10, cx2 = 10, cy = 0, r = 5.5 }) => (

    <ellipse cx={cx2} cy={cy} rx={r} ry={r * 1.15} fill="#1a1410" />
    <circle cx={cx1 + r * 0.35} cy={cy - r * 0.4} r={r * 0.32} fill="#fff" />
    <circle cx={cx2 + r * 0.35} cy={cy - r * 0.4} r={r * 0.32} fill="#fff" />
    <circle cx={cx1 - r * 0.45} cy={cy + r * 0.4} r={r * 0.18} fill="#fff" opacity="0.7" />
    <circle cx={cx2 - r * 0.45} cy={cy + r * 0.4} r={r * 0.18} fill="#fff" opacity="0.7" />

    <path d={`M${w * 0.35} ${cy + 1.5} l1.2 3 l1.2 -3 Z`} fill="#fff" stroke="#1a1410" strokeWidth="0.8" strokeLinejoin="round" />

function Posy({ size = 80, color = "#F2B8DC", accent = "#D98BC4", style }) {
  return (
    <svg viewBox="-50 -50 100 100" width={size} height={size} style={style}>
      <ellipse cx="0" cy="40" rx="26" ry="4" fill="#000" opacity="0.08" />
      <g transform="translate(0,-32)">
        <circle cx="-7" cy="-2" r="5" fill="#fff" stroke="#1a1410" strokeWidth="1.6" />
        <circle cx="7" cy="-2" r="5" fill="#fff" stroke="#1a1410" strokeWidth="1.6" />
        <circle cx="-4" cy="5" r="5" fill="#fff" stroke="#1a1410" strokeWidth="1.6" />

// ADD SCREEN
// ─────────────────────────────────────────────────────────────
function AddScreen({ palette, tweaks, onSave, members }) {
  const [amount, setAmount] = React.useState("0");
  const [cat, setCat] = React.useState("food");
  const [who, setWho] = React.useState("mom");
  const [note, setNote] = React.useState("");

  const press = (k) => {
    setAmount(a => {
      if (k === "←") return a.length > 1 ? a.slice(0, -1) : "0";
      if (k === ".") return a.includes(".") ? a : a + ".";
      if (a === "0" && k !== ".") return k;
      if (a.includes(".") && a.split(".")[1]?.length >= 2) return a;
      return a + k;
    });
  };

  const keys = [["1","2","3"],["4","5","6"],["7","8","9"],[".","0","←"]];

  return (
    <div style={{ padding: "8px 16px 110px", position: "relative", zIndex: 1 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 8, marginBottom: 14 }}>
        <div>
          <h2 style={{ fontFamily: "Fredoka, sans-serif", fontSize: 26, fontWeight: 600, color: "#1a1410", margin: 0 }}>记一笔</h2>
          <div style={{ fontSize: 12, color: "rgba(26,20,16,0.55)", fontWeight: 600 }}>选个小怪兽，告诉它你花了多少</div>
        </div>
        <Mascot name={CATEGORIES.find(c => c.id === cat)?.creature || "Yumi"} size={64} />
      </div>

      <Card color={palette.primary} style={{ marginBottom: 14, textAlign: "center", padding: "20px 16px" }}>
        <div style={{ fontSize: 11, fontWeight: 800, color: "#1a1410", opacity: 0.65, textTransform: "uppercase", letterSpacing: 1 }}>金额</div>
        <div style={{ display: "flex", alignItems: "baseline", justifyContent: "center", gap: 4, marginTop: 6 }}>
          <span style={{ fontFamily: "Fredoka, sans-serif", fontSize: 32, fontWeight: 600, color: "#1a1410" }}>¥</span>
          <input
            type="text"
            inputMode="decimal"
            value={amount}
            onChange={e => {
              const v = e.target.value.replace(/[^0-9.]/g, "");
              const parts = v.split(".");
              if (parts.length > 2) return;
              if (parts[1]?.length > 2) return;
              setAmount(v === "" ? "0" : v);
            }}
            style={{
              fontFamily: "Fredoka, sans-serif", fontSize: 56, fontWeight: 600,
              color: "#1a1410", lineHeight: 1, background: "transparent",
              border: "none", outline: "none", width: "5ch", minWidth: 80,
              textAlign: "left", padding: 0,
            }}
          />
        </div>
      </Card>

      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 12, fontWeight: 800, color: "rgba(26,20,16,0.6)", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.5 }}>分类</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
          {CATEGORIES.map(c => {
            const sel = c.id === cat;
            return (
              <div key={c.id} onClick={() => setCat(c.id)} style={{
                background: sel ? c.color : "#FFF",
                border: "2px solid #1a1410", borderRadius: 16,
                boxShadow: sel ? "0 3px 0 #1a1410" : "0 2px 0 #1a1410",
                padding: 8, textAlign: "center", cursor: "pointer",
                transform: sel ? "translateY(-1px)" : "none",
                transition: "all 120ms",
              }}>
                <Mascot name={c.creature} size={44} />
                <div style={{ fontSize: 12, fontWeight: 800, color: "#1a1410", marginTop: 2 }}>{c.name}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 12, fontWeight: 800, color: "rgba(26,20,16,0.6)", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.5 }}>谁付的</div>
        <div style={{ display: "flex", gap: 8, overflowX: "auto" }}>
          {members.map(f => {
            const sel = f.id === who;
            return (
              <div key={f.id} onClick={() => setWho(f.id)} style={{
                background: sel ? f.color : "#FFF",
                border: "2px solid #1a1410", borderRadius: 14,
                boxShadow: sel ? "0 3px 0 #1a1410" : "0 2px 0 #1a1410",
                padding: "6px 10px 6px 6px", display: "flex", alignItems: "center", gap: 6,
                cursor: "pointer", flexShrink: 0,
                transform: sel ? "translateY(-1px)" : "none",
                transition: "all 120ms",
              }}>
                <Mascot name={f.creature} size={36} color={f.color} accent={f.accent} />
                <div style={{ fontSize: 13, fontWeight: 800, color: "#1a1410" }}>{f.name}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ marginBottom: 14 }}>
        <input
          type="text"
          placeholder="加点小备注… (可选)"
          value={note}
          onChange={(e) => setNote(e.target.value)}
          style={{
            width: "100%", boxSizing: "border-box",
            padding: "12px 14px", borderRadius: 14,
            border: "2px solid #1a1410", boxShadow: "0 2px 0 #1a1410",
            fontSize: 14, fontFamily: "inherit", fontWeight: 600,
            background: "#FFF", color: "#1a1410", outline: "none",
          }}
        />
      </div>

      <Card color="#FFF" style={{ padding: 10, marginBottom: 10 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
          {keys.flat().map(k => (
            <button key={k} onClick={() => press(k)} style={{
              padding: "12px 0", borderRadius: 12,
              border: "2px solid #1a1410", boxShadow: "0 2px 0 #1a1410",
              background: "#FFF6E9", fontFamily: "Fredoka, sans-serif",
              fontSize: 22, fontWeight: 600, color: "#1a1410", cursor: "pointer",
            }}>{k}</button>
          ))}
        </div>
      </Card>

      <button onClick={() => { onSave({ amount, cat, who, note }); setAmount("0"); setNote(""); }} style={{
        width: "100%", padding: "16px 0", borderRadius: 18,
        border: "2px solid #1a1410", boxShadow: "0 4px 0 #1a1410",
        background: palette.primaryDeep, color: "#1a1410",
        fontFamily: "Fredoka, sans-serif", fontSize: 18, fontWeight: 600,
        cursor: "pointer",
      }}>记好啦 ✨</button>
    </div>
  );
}

// GOALS SCREEN
// ─────────────────────────────────────────────────────────────
const GOAL_CREATURES = ["Zoomi","Cozy","Pip","Yumi","Heart","Boba","Posy","Elephant"];
const GOAL_COLORS = ["#A8D8F0","#B8E0B5","#FFE08A","#FFB59E","#FFB5C5","#F9C9A8","#F2B8DC","#FFAAAA"];

function GoalsScreen({ palette }) {
  const [goals, setGoals] = React.useState(GOALS);
  const [adding, setAdding] = React.useState(false);
  const [newName, setNewName] = React.useState("");
  const [newTarget, setNewTarget] = React.useState("");
  const [newCreature, setNewCreature] = React.useState("Zoomi");
  const [newColor, setNewColor] = React.useState("#A8D8F0");

  const removeGoal = (id) => setGoals(gs => gs.filter(g => g.id !== id));

  const saveGoal = () => {
    const t = parseFloat(newTarget);
    if (!newName.trim() || isNaN(t) || t <= 0) return;
    setGoals(gs => [...gs, {
      id: Date.now(), name: newName.trim(), target: t, saved: 0,
      creature: newCreature, color: newColor, days: 90,
    }]);
    setAdding(false);
    setNewName(""); setNewTarget(""); setNewCreature("Zoomi"); setNewColor("#A8D8F0");
  };

  return (
    <div style={{ padding: "8px 16px 110px", position: "relative", zIndex: 1 }}>
      <div style={{ marginTop: 8, marginBottom: 14 }}>
        <h2 style={{ fontFamily: "Fredoka, sans-serif", fontSize: 26, fontWeight: 600, color: "#1a1410", margin: 0 }}>梦想储蓄罐</h2>
        <div style={{ fontSize: 13, color: "rgba(26,20,16,0.55)", fontWeight: 600 }}>一起攒一点，慢慢就到啦</div>
      </div>

      <Card color={palette.primary} style={{ marginBottom: 16, display: "flex", alignItems: "center", gap: 14 }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: "#1a1410", opacity: 0.65, textTransform: "uppercase", letterSpacing: 0.5 }}>已存</div>
          <div style={{ fontFamily: "Fredoka, sans-serif", fontSize: 36, fontWeight: 600, color: "#1a1410", lineHeight: 1 }}>
            {yuan(goals.reduce((a, g) => a + g.saved, 0), 0)}
          </div>
          <div style={{ fontSize: 12, color: "#1a1410", opacity: 0.7, fontWeight: 700, marginTop: 4 }}>
            离目标还差 {yuan(goals.reduce((a, g) => a + (g.target - g.saved), 0), 0)}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center" }}>
          <Coin size={30} />
          <Coin size={36} style={{ marginLeft: -8 }} />
          <Coin size={28} style={{ marginLeft: -8 }} />
        </div>
      </Card>

      {goals.map(g => {
        const pct = (g.saved / g.target) * 100;
        return (
          <Card key={g.id} color="#FFF" style={{ marginBottom: 12, padding: 14 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
              <div style={{
                width: 60, height: 60, borderRadius: 18, background: g.color,
                border: "2px solid #1a1410", display: "flex", alignItems: "center", justifyContent: "center",
                boxShadow: "0 2px 0 #1a1410", flexShrink: 0,
              }}>
                <Mascot name={g.creature} size={52} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 800, fontSize: 16, color: "#1a1410" }}>{g.name}</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginTop: 2 }}>
                  <span style={{ fontFamily: "Fredoka, sans-serif", fontSize: 20, fontWeight: 600, color: "#1a1410" }}>
                    {yuan(g.saved, 0)}
                  </span>
                  <span style={{ fontSize: 12, color: "rgba(26,20,16,0.55)", fontWeight: 700 }}>
                    / {yuan(g.target, 0)}
                  </span>
                </div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
                <Chip color={g.color}>{g.days} 天</Chip>
                <button onClick={() => removeGoal(g.id)} style={{
                  background: "none", border: "1.5px solid rgba(26,20,16,0.25)", borderRadius: 8,
                  width: 24, height: 24, cursor: "pointer", fontSize: 14, color: "rgba(26,20,16,0.45)",
                  display: "flex", alignItems: "center", justifyContent: "center", padding: 0,
                }}>×</button>
              </div>
            </div>
            <Progress value={pct} color={g.color} height={14} />
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, fontSize: 11, fontWeight: 700, color: "rgba(26,20,16,0.6)" }}>
              <span>{pct.toFixed(0)}% 完成</span>
              <span>{g.days > 0 ? `每天存 ${yuan((g.target - g.saved) / g.days, 0)} 就行` : "🎉 完成啦"}</span>
            </div>
          </Card>
        );
      })}

      {adding ? (
        <Card color="#FFF" style={{ padding: 16, marginTop: 8 }}>
          <div style={{ fontWeight: 800, fontSize: 15, color: "#1a1410", marginBottom: 12 }}>新目标</div>
          <input
            placeholder="目标名称"
            value={newName}
            onChange={e => setNewName(e.target.value)}
            style={{
              width: "100%", boxSizing: "border-box", padding: "10px 12px",
              borderRadius: 12, border: "2px solid #1a1410", boxShadow: "0 2px 0 #1a1410",
              fontSize: 14, fontFamily: "inherit", fontWeight: 600,
              background: "#FFF", color: "#1a1410", outline: "none", marginBottom: 10,
            }}
          />
          <input
            placeholder="目标金额 (¥)"
            type="number"
            value={newTarget}
            onChange={e => setNewTarget(e.target.value)}
            style={{
              width: "100%", boxSizing: "border-box", padding: "10px 12px",
              borderRadius: 12, border: "2px solid #1a1410", boxShadow: "0 2px 0 #1a1410",
              fontSize: 14, fontFamily: "inherit", fontWeight: 600,
              background: "#FFF", color: "#1a1410", outline: "none", marginBottom: 10,
            }}
          />
          <div style={{ fontSize: 12, fontWeight: 800, color: "rgba(26,20,16,0.6)", marginBottom: 6 }}>选小怪兽</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
            {GOAL_CREATURES.map((c, i) => (
              <div key={c} onClick={() => { setNewCreature(c); setNewColor(GOAL_COLORS[i]); }} style={{
                width: 44, height: 44, borderRadius: 12,
                background: newCreature === c ? GOAL_COLORS[i] : "#F5F5F5",
                border: newCreature === c ? "2px solid #1a1410" : "2px solid transparent",
                display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
              }}>
                <Mascot name={c} size={36} />
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setAdding(false)} style={{
              flex: 1, padding: "12px 0", borderRadius: 14,
              border: "2px solid #1a1410", boxShadow: "0 2px 0 #1a1410",
              background: "#FFF", fontSize: 14, fontWeight: 800, cursor: "pointer",
            }}>取消</button>
            <button onClick={saveGoal} style={{
              flex: 2, padding: "12px 0", borderRadius: 14,
              border: "2px solid #1a1410", boxShadow: "0 3px 0 #1a1410",
              background: palette.primaryDeep, fontSize: 14, fontWeight: 800, cursor: "pointer",
            }}>保存目标 ✨</button>
          </div>
        </Card>
      ) : (
        <div onClick={() => setAdding(true)} style={{
          marginTop: 8, padding: "14px 16px", borderRadius: 18,
          border: "2px dashed #1a1410", textAlign: "center",
          color: "#1a1410", fontWeight: 800, fontSize: 14, cursor: "pointer",
        }}>+ 添加新目标</div>
      )}
    </div>
  );
}

function blendColor(hex, alpha) {
  const h = hex.replace('#', '');
  const r = parseInt(h.slice(0,2),16);
  const g = parseInt(h.slice(2,4),16);
  const b = parseInt(h.slice(4,6),16);
  const rOut = Math.round(r * alpha + 255 * (1 - alpha));
  const gOut = Math.round(g * alpha + 255 * (1 - alpha));
  const bOut = Math.round(b * alpha + 255 * (1 - alpha));
  return `rgb(${rOut},${gOut},${bOut})`;
}

        <TweakSection label="装饰" />
        <TweakToggle label="背景星星" value={t.showStickers} onChange={(v) => setTweak("showStickers", v)} />
        <TweakToggle label="紧凑列表" value={t.denseList} onChange={(v) => setTweak("denseList", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
